services:
  init-network:
    image: ${BESU_IMAGE}
    container_name: besu-init-network
    entrypoint: ["/bin/sh", "/scripts/init-network.sh"]
    restart: "no"
    network_mode: "none"
    volumes:
      - besu-network-data:/network
      - ./config:/config:ro
      - ./scripts:/scripts:ro
  node-1:
    image: ${BESU_IMAGE}
    container_name: besu-node-1
    hostname: node-1
    depends_on:
      init-network:
        condition: service_completed_successfully
    networks:
      besu-network:
        ipv4_address: 172.25.0.2
    volumes:
      - besu-network-data:/network
      - ./scripts:/scripts:ro
    command:
      # Data and Network
      - --data-path=/network/node-1/config
      - --genesis-file=/network/networkFiles/genesis.json
      - --network-id=${NETWORK_ID}

      # HTTP JSON-RPC
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,QBFT,WEB3,ADMIN,DEBUG,TXPOOL
      - --rpc-http-max-active-connections=80
      - --rpc-http-cors-origins=*
      - --host-allowlist=*

      # P2P Networking
      - --p2p-enabled=true
      - --p2p-host=0.0.0.0
      - --p2p-port=30303

      # WS-RPC
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,QBFT,WEB3,ADMIN,DEBUG,TRACE,TXPOOL
      - --rpc-ws-max-active-connections=80
      - --data-storage-format=BONSAI
      - --min-gas-price=${MIN_GAS_PRICE}
    entrypoint: ["/bin/sh", "/scripts/besu-entrypoint.sh"]
    restart: unless-stopped

  node-2:
    image: ${BESU_IMAGE}
    container_name: besu-node-2
    hostname: node-2
    depends_on:
      init-network:
        condition: service_completed_successfully
    networks:
      besu-network:
        ipv4_address: 172.25.0.3
    volumes:
      - besu-network-data:/network
      - ./scripts:/scripts:ro
    command:
      # Data and Network
      - --data-path=/network/node-2/config
      - --genesis-file=/network/networkFiles/genesis.json
      - --network-id=${NETWORK_ID}

      # HTTP JSON-RPC
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,QBFT,WEB3,ADMIN
      - --rpc-http-cors-origins=*
      - --rpc-http-max-active-connections=80
      - --host-allowlist=*

      # P2P Networking
      - --p2p-enabled=true
      - --p2p-host=0.0.0.0
      - --p2p-port=30303

      # WS-RPC
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,QBFT,WEB3,ADMIN,DEBUG,TRACE,TXPOOL
      - --rpc-ws-max-active-connections=80
      - --data-storage-format=BONSAI
      - --min-gas-price=${MIN_GAS_PRICE}
    entrypoint: ["/bin/sh", "/scripts/besu-entrypoint.sh"]
    restart: unless-stopped

  node-3:
    image: ${BESU_IMAGE}
    container_name: besu-node-3
    hostname: node-3
    depends_on:
      init-network:
        condition: service_completed_successfully
    networks:
      besu-network:
        ipv4_address: 172.25.0.4
    volumes:
      - besu-network-data:/network
      - ./scripts:/scripts:ro
    command:
      # Data and Network
      - --data-path=/network/node-3/config
      - --genesis-file=/network/networkFiles/genesis.json
      - --network-id=${NETWORK_ID}

      # HTTP JSON-RPC
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,QBFT,WEB3,ADMIN
      - --rpc-http-max-active-connections=80
      - --rpc-http-cors-origins=*
      - --host-allowlist=*

      # P2P Networking
      - --p2p-enabled=true
      - --p2p-host=0.0.0.0
      - --p2p-port=30303

      # WS-RPC
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,QBFT,WEB3,ADMIN,DEBUG,TRACE,TXPOOL
      - --rpc-ws-max-active-connections=80
      - --data-storage-format=BONSAI
      - --min-gas-price=${MIN_GAS_PRICE}
    entrypoint: ["/bin/sh", "/scripts/besu-entrypoint.sh"]
    restart: unless-stopped

  node-4:
    image: ${BESU_IMAGE}
    container_name: besu-node-4
    hostname: node-4
    depends_on:
      init-network:
        condition: service_completed_successfully
    networks:
      besu-network:
        ipv4_address: 172.25.0.5
    volumes:
      - besu-network-data:/network
      - ./scripts:/scripts:ro
    command:
      # Data and Network
      - --data-path=/network/node-4/config
      - --genesis-file=/network/networkFiles/genesis.json
      - --network-id=${NETWORK_ID}

      # HTTP JSON-RPC (RPC Node - no ADMIN/QBFT APIs for security)
      - --rpc-http-enabled
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3
      - --rpc-http-max-active-connections=80
      - --rpc-http-cors-origins=*
      - --host-allowlist=*

      # P2P Networking
      - --p2p-enabled=true
      - --p2p-host=0.0.0.0
      - --p2p-port=30303
      - --data-storage-format=BONSAI
      - --min-gas-price=${MIN_GAS_PRICE}
    entrypoint: ["/bin/sh", "/scripts/besu-entrypoint.sh"]
    restart: unless-stopped

  rpc-proxy:
    image: nginx:1.27-alpine
    container_name: besu-rpc-proxy
    depends_on:
      - node-4
    networks:
      - besu-network
    ports:
      - "8548:8548"
    environment:
      X_HEADER_SECRET: ${X_HEADER_SECRET}
    volumes:
      - ./config/nginx-rpc.conf.template:/etc/nginx/templates/default.conf.template:ro

networks:
  besu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  besu-network-data:
