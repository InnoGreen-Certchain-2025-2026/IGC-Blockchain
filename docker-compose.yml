  node-4:
    image: ${BESU_IMAGE}
    container_name: besu-node-4
    hostname: node-4
    networks:
      besu-network:
        ipv4_address: 172.25.0.5
    ports:
      - '854  8:8545' # HTTP JSON-RPC
      - '30306:30303' # P2P
    volumes:
